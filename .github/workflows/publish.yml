name: Publish
on:
  push:
    branches:
      - master
    paths:
      - RELEASE_NOTES.md
      - .github/workflows/publish.yml
# Publishes the MANAGED Aardium.Shared lib only. The per-platform native browser
# packages (Aardium.Shared-{Win32|Linux|Darwin}-{x64|arm64}) are built manually on
# the machines that hold the patched Electron (see PACKAGING.md) — CI runners have
# only vanilla Electron, so they cannot produce a zero-copy native.
jobs:
  pack:
    name: Package (managed lib)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Install Dotnet
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json
      - name: Restore Tools
        run: dotnet tool restore
      - name: Restore
        run: dotnet paket restore
      - name: Build
        run: dotnet build -c Release src/Aardium.Shared.sln
      - name: Pack
        # aardpack/paket would greedily pack every paket.template in the tree
        # (incl. the native ones referencing dist artifacts absent on CI). Pack
        # ONLY the managed template; take the version from RELEASE_NOTES.
        run: |
          set -e
          VERSION=$(dotnet aardpack --parse-only 2>/dev/null | awk 'NF{last=$0} END{print last}' | tr -d '[:space:]')
          echo "Packing managed Aardium.Shared $VERSION"
          mkdir -p bin/pack
          dotnet paket pack bin/pack --template src/Aardium.Shared/paket.template --version "$VERSION"
          ls -la bin/pack
      - name: Upload Packages
        uses: actions/upload-artifact@v4
        with:
          name: packages
          path: bin/pack
      - name: NuGet
        env:
          NUGET_KEY: ${{ secrets.NUGET_KEY }}
        run: dotnet nuget push "bin/pack/*.nupkg" -k "$NUGET_KEY" -s "https://api.nuget.org/v3/index.json" --skip-duplicate
